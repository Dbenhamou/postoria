<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Postoria — Générateur Visuel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --ivory:#F8F6F2; --sand:#ECE6DD; --charcoal:#232323;
  --forest:#4F6754; --copper:#A8784F; --white:#FFFFFF;
  --border:#E5DFD5; --text1:#232323; --text2:#727272; --text3:#A8A49C;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--ivory);color:var(--text1);min-height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* NAV */
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.nav-logo{display:flex;align-items:center;gap:9px;}
.nav-icon{width:28px;height:28px;background:var(--forest);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.nav-icon svg{width:15px;height:15px;}
.nav-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;letter-spacing:.05em;color:var(--text1);}
.nav-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(168,120,79,.1);color:var(--copper);border:1px solid rgba(168,120,79,.2);font-weight:500;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR CONTROLS */
.controls{width:300px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:24px 20px;}
.ctrl-section{margin-bottom:24px;}
.ctrl-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

/* TEMPLATE TABS */
.tmpl-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:0;}
.tmpl-tab{padding:8px 4px;border-radius:9px;border:1px solid var(--border);background:var(--ivory);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;}
.tmpl-tab:hover{border-color:var(--forest);color:var(--forest);}
.tmpl-tab.active{background:var(--forest);color:white;border-color:var(--forest);}
.tmpl-icon{font-size:16px;display:block;margin-bottom:3px;}

/* FORMAT TABS */
.fmt-tabs{display:flex;gap:6px;}
.fmt-tab{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:var(--ivory);font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;}
.fmt-tab.active{background:var(--forest);color:white;border-color:var(--forest);}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--ivory);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text1);font-size:13px;font-family:'Inter',sans-serif;transition:border-color .2s;}
.form-input:focus{outline:none;border-color:var(--forest);}
textarea.form-input{resize:none;line-height:1.6;}

/* COLOR SWATCHES */
.swatch-row{display:flex;gap:7px;flex-wrap:wrap;}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.swatch.active{border-color:var(--charcoal);transform:scale(1.15);}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .18s;}
.btn:hover{opacity:.85;}
.btn-forest{background:var(--forest);color:white;}
.btn-copper{background:var(--copper);color:white;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-full{width:100%;justify-content:center;}

/* CANVAS AREA */
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px;overflow-y:auto;gap:24px;}
.canvas-wrap{position:relative;}
.canvas-label{font-size:11px;color:var(--text3);text-align:center;margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}

/* EXPORT BAR */
.export-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

/* ─── TEMPLATES ─── */

/* 1. QUOTE CARD */
.tpl-quote{
  font-family:'Playfair Display',serif;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:56px 52px;
  position:relative;overflow:hidden;
}
.tpl-quote .bg-accent{position:absolute;bottom:0;right:0;width:180px;height:180px;opacity:.06;}
.tpl-quote .q-logo{display:flex;align-items:center;gap:8px;margin-bottom:auto;}
.tpl-quote .q-logo-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.tpl-quote .q-logo-name{font-size:13px;font-weight:600;letter-spacing:.06em;}
.tpl-quote .q-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 0 32px;}
.tpl-quote .q-mark{font-size:72px;line-height:.8;margin-bottom:16px;opacity:.15;font-style:normal;}
.tpl-quote .q-text{font-size:28px;font-weight:500;line-height:1.35;font-style:italic;}
.tpl-quote .q-rule{width:36px;height:2px;margin:24px 0;}
.tpl-quote .q-author{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;opacity:.7;}
.tpl-quote .q-footer{display:flex;align-items:center;justify-content:space-between;}
.tpl-quote .q-tag{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid;opacity:.5;}
.tpl-quote .q-date{font-family:'Inter',sans-serif;font-size:11px;opacity:.4;}

/* 2. STAT CARD */
.tpl-stat{
  font-family:'Inter',sans-serif;
  display:flex;flex-direction:column;
  padding:52px;
  position:relative;overflow:hidden;
}
.tpl-stat .s-logo{display:flex;align-items:center;gap:8px;margin-bottom:48px;}
.tpl-stat .s-logo-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.tpl-stat .s-logo-name{font-size:13px;font-weight:600;letter-spacing:.06em;}
.tpl-stat .s-eyebrow{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;opacity:.5;margin-bottom:12px;}
.tpl-stat .s-number{font-family:'Playfair Display',serif;font-size:96px;font-weight:600;line-height:.9;margin-bottom:8px;}
.tpl-stat .s-unit{font-size:32px;font-weight:300;opacity:.6;margin-left:4px;}
.tpl-stat .s-label{font-size:18px;font-weight:400;opacity:.7;margin-bottom:32px;line-height:1.4;}
.tpl-stat .s-rule{width:36px;height:2px;margin-bottom:28px;}
.tpl-stat .s-context{font-size:14px;line-height:1.65;opacity:.65;max-width:420px;}
.tpl-stat .s-footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;}
.tpl-stat .s-tag{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid;opacity:.45;}
.tpl-stat .s-bg-num{position:absolute;right:-20px;bottom:-40px;font-family:'Playfair Display',serif;font-size:320px;font-weight:700;opacity:.04;line-height:1;pointer-events:none;user-select:none;}

/* 3. ALERTE */
.tpl-alert{
  font-family:'Inter',sans-serif;
  display:flex;flex-direction:column;
  padding:52px;
  position:relative;overflow:hidden;
}
.tpl-alert .a-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:44px;}
.tpl-alert .a-logo{display:flex;align-items:center;gap:8px;}
.tpl-alert .a-logo-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.tpl-alert .a-logo-name{font-size:13px;font-weight:600;letter-spacing:.06em;}
.tpl-alert .a-badge{font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;}
.tpl-alert .a-cve{font-size:13px;font-weight:600;letter-spacing:.06em;opacity:.5;margin-bottom:14px;text-transform:uppercase;}
.tpl-alert .a-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:600;line-height:1.25;margin-bottom:20px;}
.tpl-alert .a-rule{width:36px;height:3px;border-radius:2px;margin-bottom:24px;}
.tpl-alert .a-desc{font-size:15px;line-height:1.7;opacity:.7;margin-bottom:32px;max-width:460px;}
.tpl-alert .a-items{display:flex;flex-direction:column;gap:10px;margin-bottom:auto;}
.tpl-alert .a-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;line-height:1.55;}
.tpl-alert .a-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.tpl-alert .a-footer{margin-top:36px;display:flex;align-items:center;justify-content:space-between;}
.tpl-alert .a-severity{font-size:11px;font-weight:600;padding:4px 12px;border-radius:6px;letter-spacing:.04em;}
.tpl-alert .a-src{font-size:11px;opacity:.35;}
.tpl-alert .a-noise{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}

/* THEMES */
.theme-ivory{background:#F8F6F2;color:#232323;}
.theme-forest{background:#4F6754;color:#F8F6F2;}
.theme-charcoal{background:#232323;color:#F8F6F2;}
.theme-copper{background:#A8784F;color:#F8F6F2;}
.theme-sand{background:#ECE6DD;color:#232323;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M6 4h8a4 4 0 0 1 0 8H6V4Z" fill="white" opacity=".9"/><path d="M6 12h5l4 8H6v-8Z" fill="white" opacity=".5"/></svg></div>
    <span class="nav-name">POSTORIA</span>
  </div>
  <span class="nav-badge">Générateur visuel</span>
</nav>

<div class="layout">

  <!-- CONTROLS -->
  <aside class="controls">

    <div class="ctrl-section">
      <div class="ctrl-title">Template</div>
      <div class="tmpl-tabs">
        <div class="tmpl-tab active" onclick="setTemplate('quote',this)"><span class="tmpl-icon">❝</span>Quote</div>
        <div class="tmpl-tab" onclick="setTemplate('stat',this)"><span class="tmpl-icon">◎</span>Stat</div>
        <div class="tmpl-tab" onclick="setTemplate('alert',this)"><span class="tmpl-icon">⚠</span>Alerte</div>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-title">Thème</div>
      <div class="swatch-row">
        <div class="swatch active" style="background:#F8F6F2;border-color:#E5DFD5;" onclick="setTheme('ivory',this)" title="Ivory"></div>
        <div class="swatch" style="background:#4F6754;" onclick="setTheme('forest',this)" title="Forest"></div>
        <div class="swatch" style="background:#232323;" onclick="setTheme('charcoal',this)" title="Charcoal"></div>
        <div class="swatch" style="background:#A8784F;" onclick="setTheme('copper',this)" title="Copper"></div>
        <div class="swatch" style="background:#ECE6DD;border-color:#E5DFD5;" onclick="setTheme('sand',this)" title="Sand"></div>
      </div>
    </div>

    <!-- QUOTE FIELDS -->
    <div id="fields-quote" class="ctrl-section">
      <div class="ctrl-title">Contenu</div>
      <div class="form-group">
        <label class="form-label">Citation</label>
        <textarea class="form-input" id="q-text" rows="4" oninput="render()" placeholder="Votre expertise mérite d'être visible. Pas votre agenda.">Votre expertise mérite d'être visible. Pas votre agenda.</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Auteur</label>
        <input class="form-input" id="q-author" oninput="render()" value="David · AE @Cyna">
      </div>
      <div class="form-group">
        <label class="form-label">Tag</label>
        <input class="form-input" id="q-tag" oninput="render()" value="Cybersécurité MSP">
      </div>
    </div>

    <!-- STAT FIELDS -->
    <div id="fields-stat" class="ctrl-section" style="display:none;">
      <div class="ctrl-title">Contenu</div>
      <div class="form-group">
        <label class="form-label">Chiffre clé</label>
        <input class="form-input" id="s-number" oninput="render()" value="73">
      </div>
      <div class="form-group">
        <label class="form-label">Unité (optionnel)</label>
        <input class="form-input" id="s-unit" oninput="render()" value="%">
      </div>
      <div class="form-group">
        <label class="form-label">Label du chiffre</label>
        <input class="form-input" id="s-label" oninput="render()" value="des MSP français ne testent jamais leur plan de reprise">
      </div>
      <div class="form-group">
        <label class="form-label">Contexte</label>
        <textarea class="form-input" id="s-context" rows="3" oninput="render()">Un ransomware, ça ne prévient pas. La question n'est pas "si" mais "quand".</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Source</label>
        <input class="form-input" id="s-tag" oninput="render()" value="Source : ANSSI 2025">
      </div>
    </div>

    <!-- ALERT FIELDS -->
    <div id="fields-alert" class="ctrl-section" style="display:none;">
      <div class="ctrl-title">Contenu</div>
      <div class="form-group">
        <label class="form-label">Référence CVE / ID</label>
        <input class="form-input" id="a-cve" oninput="render()" value="CVE-2025-21298">
      </div>
      <div class="form-group">
        <label class="form-label">Titre de l'alerte</label>
        <input class="form-input" id="a-title" oninput="render()" value="Exécution de code à distance sur Windows OLE">
      </div>
      <div class="form-group">
        <label class="form-label">Description courte</label>
        <textarea class="form-input" id="a-desc" rows="3" oninput="render()">Faille critique dans Windows Object Linking. Score CVSS 9.8. Patch disponible.</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Points d'action (un par ligne)</label>
        <textarea class="form-input" id="a-items" rows="4" oninput="render()">Appliquer le patch KB5049981 immédiatement
Vérifier l'exposition des endpoints clients
Activer les alertes Defender for Endpoint</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Sévérité</label>
        <select class="form-input" id="a-severity" onchange="render()">
          <option value="CRITIQUE">CRITIQUE</option>
          <option value="ÉLEVÉE">ÉLEVÉE</option>
          <option value="MODÉRÉE">MODÉRÉE</option>
        </select>
      </div>
    </div>

    <div class="ctrl-section">
      <div class="ctrl-title">Format export</div>
      <div class="fmt-tabs">
        <div class="fmt-tab active" onclick="setFormat('square',this)">1080×1080</div>
        <div class="fmt-tab" onclick="setFormat('portrait',this)">1080×1350</div>
      </div>
    </div>

    <div class="ctrl-section" style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-forest btn-full" onclick="exportPNG()">↓ Télécharger PNG</button>
      <button class="btn btn-ghost btn-full" onclick="exportBoth()">↓ Télécharger les 2 formats</button>
    </div>

  </aside>

  <!-- CANVAS AREA -->
  <div class="canvas-area">
    <div>
      <div class="canvas-label" id="canvas-label">Aperçu — 1080 × 1080</div>
      <div class="canvas-wrap">
        <div id="preview" style="width:480px;height:480px;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.12);"></div>
      </div>
    </div>
  </div>

</div>

<!-- Hidden export canvas (full res) -->
<div id="export-container" style="position:fixed;left:-9999px;top:0;"></div>

<script>
let currentTemplate = 'quote'
let currentTheme = 'ivory'
let currentFormat = 'square'

const themes = {
  ivory:    { bg:'#F8F6F2', text:'#232323', sub:'rgba(35,35,35,.55)', accent:'#4F6754', rule:'#A8784F', tag:'#A8784F', logo:'#4F6754' },
  forest:   { bg:'#4F6754', text:'#F8F6F2', sub:'rgba(248,246,242,.6)', accent:'#F8F6F2', rule:'#A8784F', tag:'rgba(248,246,242,.5)', logo:'#F8F6F2' },
  charcoal: { bg:'#232323', text:'#F8F6F2', sub:'rgba(248,246,242,.55)', accent:'#A8784F', rule:'#A8784F', tag:'rgba(248,246,242,.4)', logo:'#A8784F' },
  copper:   { bg:'#A8784F', text:'#F8F6F2', sub:'rgba(248,246,242,.65)', accent:'#F8F6F2', rule:'#F8F6F2', tag:'rgba(248,246,242,.5)', logo:'#F8F6F2' },
  sand:     { bg:'#ECE6DD', text:'#232323', sub:'rgba(35,35,35,.55)', accent:'#4F6754', rule:'#A8784F', tag:'#A8784F', logo:'#4F6754' },
}

const logoSVG = (color) => `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 4h8a4 4 0 0 1 0 8H6V4Z" fill="${color}" opacity=".9"/><path d="M6 12h5l4 8H6v-8Z" fill="${color}" opacity=".5"/></svg>`

function getDate() {
  return new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})
}

function buildQuote(size) {
  const t = themes[currentTheme]
  const text = document.getElementById('q-text').value
  const author = document.getElementById('q-author').value
  const tag = document.getElementById('q-tag').value
  const fs = size === 1080 ? 1 : 480/1080
  const s = (v) => Math.round(v * fs) + 'px'

  return `<div style="width:${size}px;height:${currentFormat==='portrait'?Math.round(size*1.25):size}px;background:${t.bg};color:${t.text};font-family:'Playfair Display',serif;display:flex;flex-direction:column;justify-content:space-between;padding:${s(56)} ${s(52)};position:relative;overflow:hidden;">
    <svg style="position:absolute;bottom:0;right:0;width:${s(200)};height:${s(200)};opacity:.05;" viewBox="0 0 200 200"><path d="M100 0 L200 100 L100 200 L0 100Z" fill="${t.text}"/></svg>
    <div style="display:flex;align-items:center;gap:${s(8)};">
      <div style="width:${s(30)};height:${s(30)};background:${t.logo};border-radius:${s(7)};display:flex;align-items:center;justify-content:center;">${logoSVG(t.bg)}</div>
      <span style="font-size:${s(13)};font-weight:600;letter-spacing:.06em;color:${t.text};font-family:'Inter',sans-serif;">POSTORIA</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:${s(40)} 0 ${s(32)};">
      <div style="font-size:${s(72)};line-height:.8;margin-bottom:${s(16)};opacity:.12;font-style:normal;">"</div>
      <div style="font-size:${s(28)};font-weight:500;line-height:1.35;font-style:italic;color:${t.text};">${text}</div>
      <div style="width:${s(36)};height:${s(2)};background:${t.rule};margin:${s(24)} 0;"></div>
      <div style="font-family:'Inter',sans-serif;font-size:${s(13)};font-weight:500;color:${t.sub};">${author}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-family:'Inter',sans-serif;font-size:${s(11)};font-weight:500;padding:${s(4)} ${s(12)};border-radius:${s(20)};border:1px solid ${t.tag};color:${t.tag};">${tag}</span>
      <span style="font-family:'Inter',sans-serif;font-size:${s(11)};color:${t.sub};">${getDate()}</span>
    </div>
  </div>`
}

function buildStat(size) {
  const t = themes[currentTheme]
  const num = document.getElementById('s-number').value
  const unit = document.getElementById('s-unit').value
  const label = document.getElementById('s-label').value
  const context = document.getElementById('s-context').value
  const tag = document.getElementById('s-tag').value
  const h = currentFormat==='portrait' ? Math.round(size*1.25) : size
  const fs = size === 1080 ? 1 : 480/1080
  const s = (v) => Math.round(v * fs) + 'px'

  return `<div style="width:${size}px;height:${h}px;background:${t.bg};color:${t.text};font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:${s(52)};position:relative;overflow:hidden;">
    <div style="position:absolute;right:${s(-20)};bottom:${s(-40)};font-family:'Playfair Display',serif;font-size:${s(320)};font-weight:700;opacity:.04;line-height:1;pointer-events:none;user-select:none;">${num}</div>
    <div style="display:flex;align-items:center;gap:${s(8)};margin-bottom:${s(48)};">
      <div style="width:${s(30)};height:${s(30)};background:${t.logo};border-radius:${s(7)};display:flex;align-items:center;justify-content:center;">${logoSVG(t.bg)}</div>
      <span style="font-size:${s(13)};font-weight:600;letter-spacing:.06em;color:${t.text};">POSTORIA</span>
    </div>
    <div style="font-size:${s(12)};font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:${t.sub};margin-bottom:${s(12)};">Chiffre clé</div>
    <div style="font-family:'Playfair Display',serif;font-size:${s(96)};font-weight:600;line-height:.9;margin-bottom:${s(8)};color:${t.accent};">${num}<span style="font-size:${s(32)};font-weight:300;opacity:.7;margin-left:${s(4)};">${unit}</span></div>
    <div style="font-size:${s(18)};font-weight:400;color:${t.sub};margin-bottom:${s(28)};line-height:1.4;max-width:${s(440)};">${label}</div>
    <div style="width:${s(36)};height:${s(2)};background:${t.rule};margin-bottom:${s(24)};"></div>
    <div style="font-size:${s(14)};line-height:1.65;color:${t.sub};max-width:${s(440)};">${context}</div>
    <div style="margin-top:auto;padding-top:${s(32)};display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:${s(11)};font-weight:500;padding:${s(4)} ${s(12)};border-radius:${s(20)};border:1px solid ${t.tag};color:${t.tag};">${tag}</span>
      <span style="font-size:${s(11)};color:${t.sub};">${getDate()}</span>
    </div>
  </div>`
}

function buildAlert(size) {
  const t = themes[currentTheme]
  const cve = document.getElementById('a-cve').value
  const title = document.getElementById('a-title').value
  const desc = document.getElementById('a-desc').value
  const itemsRaw = document.getElementById('a-items').value.split('\n').filter(l=>l.trim())
  const severity = document.getElementById('a-severity').value
  const h = currentFormat==='portrait' ? Math.round(size*1.25) : size
  const fs = size === 1080 ? 1 : 480/1080
  const s = (v) => Math.round(v * fs) + 'px'

  const sevColor = severity==='CRITIQUE' ? '#C0392B' : severity==='ÉLEVÉE' ? '#E67E22' : '#F39C12'
  const sevBg = severity==='CRITIQUE' ? 'rgba(192,57,43,.12)' : severity==='ÉLEVÉE' ? 'rgba(230,126,34,.12)' : 'rgba(243,156,18,.12)'

  const itemsHTML = itemsRaw.map(item => `
    <div style="display:flex;align-items:flex-start;gap:${s(10)};font-size:${s(13)};line-height:1.55;color:${t.sub};">
      <div style="width:${s(6)};height:${s(6)};border-radius:50%;background:${t.accent};margin-top:${s(5)};flex-shrink:0;"></div>
      <span>${item}</span>
    </div>`).join('')

  return `<div style="width:${size}px;height:${h}px;background:${t.bg};color:${t.text};font-family:'Inter',sans-serif;display:flex;flex-direction:column;padding:${s(52)};position:relative;overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${s(40)};">
      <div style="display:flex;align-items:center;gap:${s(8)};">
        <div style="width:${s(30)};height:${s(30)};background:${t.logo};border-radius:${s(7)};display:flex;align-items:center;justify-content:center;">${logoSVG(t.bg)}</div>
        <span style="font-size:${s(13)};font-weight:600;letter-spacing:.06em;color:${t.text};">POSTORIA</span>
      </div>
      <span style="font-size:${s(11)};font-weight:600;padding:${s(5)} ${s(14)};border-radius:${s(20)};background:${sevBg};color:${sevColor};letter-spacing:.06em;text-transform:uppercase;">${severity}</span>
    </div>
    <div style="font-size:${s(12)};font-weight:600;letter-spacing:.08em;color:${t.sub};margin-bottom:${s(12)};text-transform:uppercase;">${cve}</div>
    <div style="font-family:'Playfair Display',serif;font-size:${s(28)};font-weight:600;line-height:1.25;margin-bottom:${s(18)};color:${t.text};">${title}</div>
    <div style="width:${s(36)};height:${s(3)};border-radius:${s(2)};background:${sevColor};margin-bottom:${s(22)};"></div>
    <div style="font-size:${s(14)};line-height:1.7;color:${t.sub};margin-bottom:${s(28)};max-width:${s(460)};">${desc}</div>
    <div style="display:flex;flex-direction:column;gap:${s(10)};">${itemsHTML}</div>
    <div style="margin-top:auto;padding-top:${s(32)};display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:${s(11)};font-weight:600;padding:${s(4)} ${s(10)};border-radius:${s(6)};background:${sevBg};color:${sevColor};">${severity}</span>
      <span style="font-size:${s(11)};color:${t.sub};">${getDate()}</span>
    </div>
  </div>`
}

function buildHTML(size) {
  if (currentTemplate==='quote') return buildQuote(size)
  if (currentTemplate==='stat')  return buildStat(size)
  if (currentTemplate==='alert') return buildAlert(size)
}

function render() {
  document.getElementById('preview').innerHTML = buildHTML(480)
}

function setTemplate(name, el) {
  currentTemplate = name
  document.querySelectorAll('.tmpl-tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  document.querySelectorAll('[id^="fields-"]').forEach(f=>f.style.display='none')
  document.getElementById('fields-'+name).style.display='block'
  render()
}

function setTheme(name, el) {
  currentTheme = name
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'))
  el.classList.add('active')
  render()
}

function setFormat(fmt, el) {
  currentFormat = fmt
  document.querySelectorAll('.fmt-tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  const label = fmt==='square' ? '1080 × 1080' : '1080 × 1350'
  document.getElementById('canvas-label').textContent = `Aperçu — ${label}`
  const h = fmt==='portrait' ? Math.round(480*1.25) : 480
  document.getElementById('preview').style.height = h + 'px'
  render()
}

async function exportPNG() {
  const size = 1080
  const container = document.getElementById('export-container')
  container.innerHTML = buildHTML(size)
  const el = container.firstChild
  await document.fonts.ready
  const canvas = await html2canvas(el, { scale:1, useCORS:true, allowTaint:true, backgroundColor:null })
  const link = document.createElement('a')
  const fmt = currentFormat==='square' ? '1080x1080' : '1080x1350'
  link.download = `postoria-${currentTemplate}-${fmt}.png`
  link.href = canvas.toDataURL('image/png')
  link.click()
  container.innerHTML = ''
}

async function exportBoth() {
  const fmtOrig = currentFormat
  for (const fmt of ['square','portrait']) {
    currentFormat = fmt
    await exportPNG()
    await new Promise(r=>setTimeout(r,400))
  }
  currentFormat = fmtOrig
}

render()
</script>
</body>
</html>
